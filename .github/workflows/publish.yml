name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --no-sync ruff check src/ tests/

      - name: Type check (ty)
        run: uv run --no-sync ty check src/

      - name: Tests (unittest)
        run: uv run --no-sync python -m unittest discover -s tests

      - name: Self-scan smoke test
        run: uv run --no-sync harness-scorecard scan tests/fixtures/strong_harness --min-grade A

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
