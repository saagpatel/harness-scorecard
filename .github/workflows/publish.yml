name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/harness-scorecard/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run --no-sync ruff check src/ tests/

      - name: Type check (ty)
        run: uv run --no-sync ty check src/

      - name: Tests (unittest)
        run: uv run --no-sync python -m unittest discover -s tests

      - name: Self-scan smoke test
        run: uv run --no-sync harness-scorecard scan tests/fixtures/strong_harness --min-grade A

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
